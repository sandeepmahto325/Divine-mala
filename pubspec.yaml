name: divine_mala
description: Divine Mala - Premium Naam Jap Counter
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  google_sign_in: ^6.2.1

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI & Animations
  flutter_animate: ^4.3.0
  lottie: ^3.0.0
  fl_chart: ^0.66.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  confetti: ^0.7.0

  # Audio
  audioplayers: ^5.2.1
  
  # Haptics
  flutter_vibrate: ^1.3.0
  
  # Notifications
  flutter_local_notifications: ^16.3.0
  timezone: ^0.9.2

  # Ads & Monetization
  google_mobile_ads: ^4.0.0
  in_app_purchase: ^3.1.13
  
  # Widgets
  home_widget: ^0.4.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.2.1
  wakelock_plus: ^1.1.4
  share_plus: ^7.2.1
  package_info_plus: ^5.0.1
  url_launcher: ^6.2.2
  path_provider: ^2.1.1

  # Icons & Fonts
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/sounds/
    - assets/images/
  
  fonts:
    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel-Regular.ttf
        - asset: assets/fonts/Cinzel-Bold.ttf
          weight: 700
    - family: Playfair
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
